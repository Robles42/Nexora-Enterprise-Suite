events {}
http {
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        # Proxy para la API de Python
        location /api/ai/ {
            proxy_pass http://ai-python:8000/;
        }
        # Proxy para el Auth de Java
        location /api/auth/ {
            proxy_pass http://auth-java:8081/;
        }
    }
}
