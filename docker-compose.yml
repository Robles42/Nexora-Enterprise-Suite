services:
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
      - ./gateway/index.html:/usr/share/nginx/html/index.html
    depends_on:
      - auth-java
      - ai-python

  db-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: nexora_db
      MYSQL_USER: user_nexora
      MYSQL_PASSWORD: nexora_password
    ports:
      - "3307:3307"
    volumes:
      - db_data:/var/lib/mysql

  auth-java:
    build: ./auth-service-java
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-mysql:3306/nexora_db
      - SPRING_DATASOURCE_USERNAME=user_nexora
      - SPRING_DATASOURCE_PASSWORD=nexora_password
    depends_on:
      - db-mysql

  ai-python:
    build: ./ai-engine-python
    ports:
      - "8000:8000"

  billing-php:
    image: php:8.2-apache
    volumes:
      - ./billing-php:/var/www/html
    ports:
      - "8082:80"

volumes:
  db_data:
